<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Titlebar drag region -->
  <div id="titlebar"></div>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">⚡</span>
        <span class="logo-text">AI Hub</span>
      </div>

      <nav id="adapter-list"></nav>

      <div class="sidebar-footer">
        <button id="btn-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main content area -->
    <main id="main">
      <!-- Header -->
      <header id="header">
        <div class="header-left">
          <span id="current-adapter-icon"></span>
          <h1 id="current-adapter-name">Select an AI</h1>
        </div>
        <div class="header-right">
          <button id="btn-reload" title="Reload page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button id="btn-external" title="Open in browser">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
      </header>

      <!-- Webview placeholder -->
      <div id="webview-container">
        <div id="welcome-screen">
          <div class="welcome-icon">⚡</div>
          <h2>Welcome to AI Hub</h2>
          <p>Select an AI from the sidebar to get started</p>
          <p class="hint">Send a message to chat with all enabled AIs simultaneously</p>
        </div>
      </div>

      <!-- Reply panel overlay -->
      <div id="reply-panel" class="hidden">
        <div class="reply-panel-header">
          <h3>📡 All Replies</h3>
          <button id="btn-close-reply" title="Close">✕</button>
        </div>
        <div id="reply-cards"></div>
      </div>

      <!-- Input area -->
      <div id="input-area">
        <button id="btn-toggle-reply" title="Show all replies" class="input-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <textarea id="message-input" placeholder="Type a message to send to all AIs..." rows="1"></textarea>
        <button id="btn-send" title="Send to all (Cmd+Enter)" class="input-btn send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button id="btn-close-settings" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <h3>Adapters</h3>
        <p class="settings-desc">Toggle which AI platforms are active. Messages will be sent to all enabled adapters.</p>
        <div id="settings-adapters"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
